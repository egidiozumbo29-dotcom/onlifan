databases:
  - name: dollyfans-postgres
    plan: free
    databaseName: dollyfans
    user: dollyfans

services:
  # Redis (Render Key Value)
  - type: keyvalue
    name: dollyfans-redis
    plan: free
    ipAllowList: []

  # NestJS API
  - type: web
    name: dollyfans-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false # Set to your Vercel domain, comma-separated for multiple. e.g. https://dollyfans.vercel.app
      - key: API_URL
        sync: false # Set to https://dollyfans-api.onrender.com after first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: dollyfans-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: dollyfans-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: dollyfans-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # Stripe — required, set real values via Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_CLIENT_ID
        sync: false
      - key: STRIPE_PLATFORM_FEE_PERCENT
        value: "20"
      # S3-compatible storage (Cloudflare R2, AWS S3, etc.) — set after deploy
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: dollyfans
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_SIGNED_URL_TTL_SECONDS
        value: "900"
